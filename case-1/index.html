<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>

    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
        }

        main{
            width: 100%;
            height: 100%;
            position: relative;
        }

        section{
            width: 50%;
            height: 50%;
            position: absolute;
            overflow: hidden;

        }
        #center-box {
            width: 15vw;
            aspect-ratio: 1/1;
            background-color: white;
            position: absolute;
            inset: 0;
            margin: auto;
        }
        #red{ background:red; top:0; left:0; }
        #green{ background:green; top:0; right:0; }
        #orange{ background:orange; bottom:0; left:0; }
        #pink{ background:deeppink; bottom:0; right:0; }

        #circle1{
            border-radius: 50%;
        }
        #circle2{
            border-radius: 50%;
        }
        #circle3{
            border-radius: 50%;
        }
        #circle4{
            border-radius: 50%;
        }
        h1{
            width: 6vw;
            aspect-ratio: 1/1;
            background-color: red;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            position: absolute;
            margin: auto;
        }

        section > div{
            width: 16vw;
            aspect-ratio: 1/1;
            position: absolute;
            inset: 0;
            margin: auto;
            background-color: white;
        }

        #circle{
            background-color: red;
            width: 50%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            position: absolute;
            inset: 0;
            margin: auto;
            left: 0;
            top: 0;
        }

        h2{
            background-color: white;
            position: absolute;
            width: 16vw;
            aspect-ratio: 1/1;
            border-radius: 50%;
        }

        #border1{ top:-8vw; left:-8vw; }
        #border2{ top:-8vw; right:-8vw; }
        #border3{ bottom:-8vw; left:-8vw; }
        #border4{ bottom:-8vw; right:-8vw; }

        h3{
            background-color: white;
            position: absolute;
            width: 14vw;
            aspect-ratio: 1/1;
            border-radius: 50%;
        }

        #center1{ top:-10vw ;right:-7vw; }
        #center2{ top:-10vw ; left:-7vw; }
        #center3{ bottom:-10vw ; right:-7vw; }
        #center4{ bottom:-10vw; left:-7vw; }







    </style>
</head>
<body>


<main>



    <section id="red">

        <h2 id="border1"></h2>
        <h3 id="center1"></h3>
        <div id="circle1">
            <h1></h1>
        </div>
    </section>

    <section id="green">

        <h2 id="border2"></h2>
        <h3 id="center2"></h3>
        <div id="circle2">
            <h1></h1>
        </div>
    </section>

    <section id="orange">

        <h2 id="border3"></h2>
        <h3 id="center3"></h3>
        <div id="circle3">
            <h1></h1>
        </div>
    </section>

    <section id="pink">

        <h2 id="border4"></h2>
        <h3 id="center4"></h3>
        <div id="circle4">
            <h1></h1>
        </div>
    </section>

</main>
<div id="center-box">
    <div id="circle"></div>
</div>


</body>
</html>
